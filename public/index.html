<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>火之大魔王 · 这就是我的霸之意志</title>
<style>
/* ===== Reset & Base ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#0f0f1a;
  --bg-secondary:#1a1a2e;
  --bg-card:#1e1e36;
  --bg-card-hover:#252545;
  --bg-input:#2a2a40;
  --text-primary:#e8e8f0;
  --text-secondary:#a0a0b8;
  --text-muted:#666680;
  --accent:#ff6b35;
  --accent-glow:#ff8c5a;
  --accent2:#ffd700;
  --accent3:#00d4aa;
  --danger:#ff4757;
  --success:#2ed573;
  --info:#4da6ff;
  --border:rgba(255,255,255,0.08);
  --shadow:0 4px 24px rgba(0,0,0,0.4);
  --radius:12px;
  --radius-sm:8px;
  --font-mono:'Courier New',monospace;
  --font-main:'Segoe UI',system-ui,-apple-system,sans-serif;
}
html,body{height:100%}
body{
  font-family:var(--font-main);
  background:var(--bg-primary);
  color:var(--text-primary);
  line-height:1.6;
  overflow:hidden;
}
#app{display:flex;height:100vh;overflow:hidden}

/* ===== Sidebar ===== */
.sidebar{
  width:220px;
  background:var(--bg-secondary);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  flex-shrink:0;
}
.sidebar-header{
  padding:24px 20px 16px;
  border-bottom:1px solid var(--border);
}
.sidebar-logo{
  font-size:22px;
  font-weight:900;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  letter-spacing:2px;
}
.sidebar-subtitle{font-size:11px;color:var(--text-muted);margin-top:4px;letter-spacing:1px}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:12px 20px;cursor:pointer;
  color:var(--text-secondary);
  font-size:14px;font-weight:500;
  transition:all 0.2s;
  border-left:3px solid transparent;
  position:relative;
}
.nav-item:hover{color:var(--text-primary);background:rgba(255,255,255,0.03)}
.nav-item.active{
  color:var(--accent);
  background:rgba(255,107,53,0.08);
  border-left-color:var(--accent);
}
.nav-item .nav-icon{font-size:18px;width:24px;text-align:center}
.nav-item .badge{
  margin-left:auto;background:var(--accent);color:#fff;
  font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700;
}
.sidebar-footer{
  padding:16px 20px;border-top:1px solid var(--border);
  font-size:11px;color:var(--text-muted);
}

/* ===== Main Content ===== */
.main{
  flex:1;display:flex;flex-direction:column;
  overflow:hidden;
}
.page-header{
  padding:20px 28px;
  border-bottom:1px solid var(--border);
  background:var(--bg-secondary);
  display:flex;align-items:center;justify-content:space-between;
}
.page-title{font-size:20px;font-weight:700}
.page-subtitle{font-size:13px;color:var(--text-secondary);margin-top:2px}
.page-content{flex:1;overflow-y:auto;padding:24px 28px}

/* ===== Cards ===== */
.card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px;
  margin-bottom:16px;
}
.card-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;
}
.card-title{font-size:15px;font-weight:700}
.stat-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.stat-card{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius);padding:18px 20px;
  display:flex;align-items:center;gap:14px;
}
.stat-icon{
  width:48px;height:48px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;
}
.stat-icon.orange{background:rgba(255,107,53,0.15);color:var(--accent)}
.stat-icon.gold{background:rgba(255,215,0,0.15);color:var(--accent2)}
.stat-icon.green{background:rgba(0,212,170,0.15);color:var(--accent3)}
.stat-icon.blue{background:rgba(77,166,255,0.15);color:var(--info)}
.stat-value{font-size:26px;font-weight:800}
.stat-label{font-size:12px;color:var(--text-secondary)}

/* ===== Buttons ===== */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 18px;border-radius:var(--radius-sm);
  font-size:13px;font-weight:600;cursor:pointer;
  border:none;transition:all 0.2s;
  font-family:var(--font-main);
}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-glow);transform:translateY(-1px);box-shadow:0 4px 16px rgba(255,107,53,0.3)}
.btn-outline{background:transparent;color:var(--text-primary);border:1px solid var(--border)}
.btn-outline:hover{background:rgba(255,255,255,0.05)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{opacity:0.9}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-lg{padding:12px 28px;font-size:15px}

/* ===== Tables ===== */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th,td{padding:12px 16px;text-align:left;border-bottom:1px solid var(--border)}
th{font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px;background:rgba(0,0,0,0.2)}
td{font-size:14px}
tr:hover td{background:rgba(255,255,255,0.02)}

.rank-badge{
  display:inline-flex;align-items:center;justify-content:center;
  width:28px;height:28px;border-radius:8px;font-weight:700;font-size:13px;
}
.rank-1{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#000}
.rank-2{background:linear-gradient(135deg,#c0c0c0,#808080);color:#fff}
.rank-3{background:linear-gradient(135deg,#cd7f32,#8b4513);color:#fff}
.rank-other{background:var(--bg-input);color:var(--text-secondary)}

.win-rate{font-weight:600}
.win-rate.good{color:var(--accent)}
.win-rate.mid{color:var(--accent2)}
.win-rate.bad{color:var(--text-secondary)}

/* ===== Bracket ===== */
.bracket{display:flex;gap:0;align-items:stretch;overflow-x:auto;padding:10px 0}
.bracket-round{display:flex;flex-direction:column;justify-content:space-around;min-width:200px}
.bracket-round-header{
  text-align:center;font-size:11px;font-weight:700;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;
}
.bracket-match{
  position:relative;
  margin:8px 16px;
}
.bracket-slot{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;margin:3px 0;
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius-sm);
  font-size:13px;cursor:pointer;
  transition:all 0.2s;
  min-width:150px;
}
.bracket-slot:hover{border-color:var(--accent);background:var(--bg-card-hover)}
.bracket-slot.winner{border-color:var(--accent3);background:rgba(0,212,170,0.1)}
.bracket-slot.bye{opacity:0.4;font-style:italic}
.bracket-slot .score{font-weight:700;color:var(--accent);margin-left:8px}
.bracket-connector{
  position:absolute;right:-18px;top:50%;
  width:18px;height:50%;
  border-right:2px solid var(--border);
  border-top:2px solid var(--border);
  border-bottom:none;
}

/* ===== Challenge Cards ===== */
.challenge-card{
  display:grid;grid-template-columns:1fr auto 1fr;
  align-items:center;gap:16px;
  padding:16px 20px;
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius);margin-bottom:10px;
}
.challenge-card .challenger{text-align:right}
.challenge-card .defender{text-align:left}
.challenge-card .vs{
  font-size:20px;font-weight:900;color:var(--accent);
  background:rgba(255,107,53,0.1);
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}
.player-name{font-weight:700;font-size:15px}
.player-rank{font-size:11px;color:var(--text-muted)}
.challenge-actions{display:flex;gap:8px;margin-top:8px;justify-content:center}

/* ===== Status Badges ===== */
.status{
  display:inline-block;padding:3px 10px;border-radius:10px;
  font-size:11px;font-weight:600;text-transform:uppercase;
}
.status.pending{background:rgba(255,215,0,0.15);color:var(--accent2)}
.status.accepted{background:rgba(0,212,170,0.15);color:var(--accent3)}
.status.declined{background:rgba(255,71,87,0.15);color:var(--danger)}
.status.completed{background:rgba(77,166,255,0.15);color:var(--info)}
.status.upcoming{background:rgba(255,215,0,0.15);color:var(--accent2)}
.status.active{background:rgba(0,212,170,0.15);color:var(--accent3)}

/* ===== Forms & Modals ===== */
.modal-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.7);z-index:100;
  display:flex;align-items:center;justify-content:center;
  animation:fadeIn 0.2s;
}
.modal{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius);padding:28px;width:90%;max-width:480px;
  box-shadow:var(--shadow);
}
.modal h2{font-size:20px;margin-bottom:20px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
.form-group input,.form-group select{
  width:100%;padding:10px 14px;
  background:var(--bg-input);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text-primary);
  font-size:14px;font-family:var(--font-main);
  transition:border-color 0.2s;
}
.form-group input:focus,.form-group select:focus{
  outline:none;border-color:var(--accent);
}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:24px}

/* ===== Toast ===== */
.toast-container{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast{
  padding:12px 20px;border-radius:var(--radius-sm);
  font-size:13px;font-weight:600;
  animation:slideIn 0.3s;
  box-shadow:var(--shadow);
}
.toast.success{background:var(--success);color:#000}
.toast.error{background:var(--danger);color:#fff}
.toast.info{background:var(--info);color:#fff}

/* ===== Animations ===== */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* ===== Rules Page ===== */
.rules-section{margin-bottom:24px}
.rules-section h3{
  font-size:16px;color:var(--accent);margin-bottom:12px;
  padding-bottom:8px;border-bottom:1px solid var(--border);
}
.rules-section p,.rules-section li{
  font-size:14px;color:var(--text-secondary);line-height:1.8;
}
.rules-section ul{padding-left:20px}
.points-table{margin:12px 0}
.points-table td{padding:8px 14px;font-size:13px}

/* ===== Empty State ===== */
.empty-state{
  text-align:center;padding:60px 20px;
  color:var(--text-muted);
}
.empty-state .empty-icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px}

/* ===== Two Column Layout ===== */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.two-col{grid-template-columns:1fr}}

/* ===== Grid helpers ===== */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ===== Betting ===== */
.betting-tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--bg-input);border-radius:var(--radius-sm);padding:4px;width:fit-content}
.betting-tab{padding:8px 20px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text-secondary);transition:all 0.2s;border:none;background:none}
.betting-tab.active{background:var(--accent);color:#fff}
.betting-tab:hover:not(.active){color:var(--text-primary)}
.bet-card{padding:16px 20px}
.bet-card .bet-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.bet-card .bet-title{font-size:15px;font-weight:600}
.bet-card .bet-meta{font-size:11px;color:var(--text-muted)}
.bet-card .bet-vs{display:flex;align-items:center;gap:12px;margin:10px 0;font-size:18px;font-weight:700}
.bet-card .bet-vs .vs-word{color:var(--accent);font-size:14px}
.bet-card .bet-prediction{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg-input);border-radius:var(--radius-sm);margin:4px 0;font-size:13px}
.bet-card .bet-prediction.win{border-left:3px solid var(--success)}
.bet-card .bet-prediction.lose{border-left:3px solid var(--danger)}
.bet-card .bet-prediction.draw{border-left:3px solid var(--accent2)}
.bet-card .bet-actions{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}
.bet-result-badge{padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700}
.bet-result-badge.win{background:rgba(46,213,115,0.2);color:var(--success)}
.bet-result-badge.lose{background:rgba(255,71,87,0.2);color:var(--danger)}
.bet-result-badge.draw{background:rgba(255,215,0,0.2);color:var(--accent2)}
.side-bet-text{font-size:11px;color:var(--accent);font-style:italic}
.coins-display{font-size:24px;font-weight:900;color:var(--accent2)}
.coins-positive{color:var(--success)}
.coins-negative{color:var(--danger)}

/* ===== Filter Bar ===== */
.filter-bar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.filter-bar select,.filter-bar input{
  padding:8px 12px;background:var(--bg-input);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text-primary);font-size:13px;
  font-family:var(--font-main);
}

/* ===== Scrollbar ===== */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}
</style>
</head>
<body>
<div id="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">火之大魔王</div>
      <div class="sidebar-subtitle">这就是我的霸之意志</div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer" id="sidebarFooter"></div>
  </aside>

  <!-- Main Content -->
  <main class="main">
    <div class="page-header" id="pageHeader"></div>
    <div class="page-content" id="pageContent"></div>
  </main>

  <!-- Modal Container -->
  <div id="modalContainer"></div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>
</div>

<script>
// ============================================================
// DATA STORE (shared via API)
// ============================================================
const API_BASE = '';

function loadData() { return getDefaultData(); } // placeholder, real load is async in init

async function apiLoad() {
  try {
    const res = await fetch(API_BASE + '/api/state');
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    STATE = data;
  } catch(e) {
    console.error('Failed to load from server, using defaults:', e);
    STATE = getDefaultData();
  }
}

async function saveData() {
  try {
    const res = await fetch(API_BASE + '/api/state', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(STATE),
    });
    if (!res.ok) throw new Error('Save failed');
  } catch(e) {
    toast('⚠️ 保存失败，请检查网络连接', 'error');
    console.error('Save error:', e);
  }
}

function getDefaultData() {
  return {
    players: [
      { id:'p1', name:'策划大大', character:'春丽', avatar:'👩‍💻', wins:12, losses:5, points:145, joinDate:'2026-06-01' },
      { id:'p2', name:'程序一哥', character:'隆', avatar:'🧑‍💻', wins:8, losses:7, points:95, joinDate:'2026-06-01' },
      { id:'p3', name:'美术大佬', character:'蛛俐', avatar:'🎨', wins:6, losses:8, points:78, joinDate:'2026-06-05' },
      { id:'p4', name:'运营小哥', character:'肯', avatar:'📊', wins:10, losses:6, points:112, joinDate:'2026-06-02' },
      { id:'p5', name:'测试侠', character:'古烈', avatar:'🔍', wins:4, losses:10, points:52, joinDate:'2026-06-08' },
      { id:'p6', name:'UI小姐姐', character:'嘉米', avatar:'🎯', wins:7, losses:9, points:85, joinDate:'2026-06-03' },
      { id:'p7', name:'后台大佬', character:'桑吉尔夫', avatar:'⚙️', wins:9, losses:5, points:105, joinDate:'2026-06-01' },
      { id:'p8', name:'数据分析师', character:'本田', avatar:'📈', wins:3, losses:11, points:38, joinDate:'2026-06-10' },
    ],
    matches: [],
    challenges: [],
    tournaments: [],
    seasons: [
      { id:'s1', name:'2026夏季赛', startDate:'2026-06-01', endDate:'2026-08-31', status:'active', playoffs: null }
    ],
    currentSeasonId: 's1',
    // 竞猜系统
    bettors: [],
    bets: [],
  };
}

let STATE = {}; // Will be loaded via apiLoad() in init

// ============================================================
// HELPERS
// ============================================================
function gid() { return 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2,6); }
function fmtDate(d) { return new Date(d).toLocaleDateString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit'}); }
function fmtDateTime(d) { return new Date(d).toLocaleString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}); }
function getPlayer(id) { return STATE.players.find(p => p.id === id); }
function playerName(id) { const p = getPlayer(id); return p ? p.name : '未知'; }

function getRankedPlayers() {
  return [...STATE.players].sort((a,b) => b.points - a.points);
}

function getWinRate(p) {
  const total = p.wins + p.losses;
  if (total === 0) return 0;
  return Math.round((p.wins / total) * 100);
}

function winRateClass(p) {
  const wr = getWinRate(p);
  if (wr >= 60) return 'good';
  if (wr >= 40) return 'mid';
  return 'bad';
}

function getSeasonName() {
  const s = STATE.seasons.find(s => s.id === STATE.currentSeasonId);
  return s ? s.name : '当前赛季';
}

function getPendingChallengesCount() {
  return STATE.challenges.filter(c => c.status === 'pending').length;
}

function getOpenBetsCount() {
  return (STATE.bets || []).filter(b => b.status === 'open').length;
}

function getUpcomingTournaments() {
  return STATE.tournaments.filter(t => t.status === 'upcoming' || t.status === 'active');
}

// ============================================================
// TOAST
// ============================================================
function toast(msg, type='info') {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; setTimeout(() => el.remove(), 300); }, 2500);
}

// ============================================================
// MODAL
// ============================================================
function showModal(title, contentHtml, onSave) {
  const container = document.getElementById('modalContainer');
  container.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h2>${title}</h2>
        <div class="modal-body">${contentHtml}</div>
        <div class="form-actions">
          <button class="btn btn-outline" onclick="closeModal()">取消</button>
          <button class="btn btn-primary" id="modalSaveBtn">确认</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('modalSaveBtn').addEventListener('click', () => {
    if (onSave) onSave();
    closeModal();
  });
}

function closeModal() {
  document.getElementById('modalContainer').innerHTML = '';
}

// ============================================================
// NAVIGATION
// ============================================================
let currentPage = 'dashboard';

const NAV_ITEMS = [
  { id:'dashboard', icon:'🏠', label:'首页' },
  { id:'ladder', icon:'⚔️', label:'擂台挑战' },
  { id:'tournament', icon:'🏆', label:'月赛' },
  { id:'playoffs', icon:'👑', label:'季后赛' },
  { id:'betting', icon:'🎲', label:'竞猜' },
  { id:'players', icon:'👥', label:'选手' },
  { id:'history', icon:'📋', label:'战绩' },
  { id:'rules', icon:'📖', label:'赛制规则' },
];

const PLAYOFF_QUALIFY_COUNT = 8; // 前几名进入季后赛

function renderSidebar() {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = NAV_ITEMS.map(item => `
    <div class="nav-item ${currentPage === item.id ? 'active' : ''}" onclick="navigate('${item.id}')">
      <span class="nav-icon">${item.icon}</span>
      ${item.label}
      ${item.id === 'ladder' && getPendingChallengesCount() > 0 ? `<span class="badge">${getPendingChallengesCount()}</span>` : ''}
      ${item.id === 'betting' && getOpenBetsCount() > 0 ? `<span class="badge" style="background:var(--accent3)">${getOpenBetsCount()}</span>` : ''}
    </div>
  `).join('');

  const footer = document.getElementById('sidebarFooter');
  footer.textContent = `${getSeasonName()} · ${STATE.players.length}选手 · ${(STATE.bettors||[]).length}竞猜者`;
}

function navigate(pageId) {
  currentPage = pageId;
  renderSidebar();
  renderPage();
}

function renderPage() {
  const header = document.getElementById('pageHeader');
  const content = document.getElementById('pageContent');

  switch(currentPage) {
    case 'dashboard': renderDashboard(header, content); break;
    case 'ladder': renderLadder(header, content); break;
    case 'tournament': renderTournament(header, content); break;
    case 'playoffs': renderPlayoffs(header, content); break;
    case 'betting': renderBetting(header, content); break;
    case 'players': renderPlayers(header, content); break;
    case 'history': renderHistory(header, content); break;
    case 'rules': renderRules(header, content); break;
  }
}

function showChallengeModal() {
  const ranked = getRankedPlayers();
  const options = ranked.map((p,i) => `<option value="${p.id}">#${i+1} ${p.name} (${p.character}) - ${p.points}分</option>`).join('');
  const html = `
    <div class="form-group">
      <label>挑战者</label>
      <select id="challengeChallenger">
        ${options}
      </select>
    </div>
    <div class="form-group">
      <label>被挑战者</label>
      <select id="challengeDefender">
        ${options}
      </select>
    </div>
    <p style="font-size:12px;color:var(--text-muted)">提示：一般应挑战排名高于你的选手。战书发出后等待对方响应。</p>
  `;
  showModal('发起挑战', html, () => {
    const challengerId = document.getElementById('challengeChallenger').value;
    const defenderId = document.getElementById('challengeDefender').value;
    if (challengerId === defenderId) { toast('不能挑战自己！', 'error'); return; }
    STATE.challenges.push({
      id: gid(),
      challengerId,
      defenderId,
      status: 'pending',
      createdDate: new Date().toISOString(),
      score: null,
      winnerId: null,
    });
    saveData();
    toast('⚔️ 挑战已发出！', 'success');
    renderPage();
  });
}

function challengePlayer(playerId) {
  const ranked = getRankedPlayers();
  const target = getPlayer(playerId);
  const options = ranked.map((p,i) => `<option value="${p.id}" ${p.id===playerId?'selected':''}>#${i+1} ${p.name} (${p.character}) - ${p.points}分</option>`).join('');
  const html = `
    <input type="hidden" id="targetId" value="${playerId}">
    <div class="form-group">
      <label>挑战者</label>
      <select id="challengeChallenger">
        ${options}
      </select>
    </div>
    <div class="form-group">
      <label>被挑战者</label>
      <select id="challengeDefender">
        ${options}
      </select>
    </div>
    <p style="font-size:12px;color:var(--text-muted)">发起挑战后，等待 ${target.name} 接受并完成对战。</p>
  `;
  showModal(`挑战 ${target.name}`, html, () => {
    const challengerId = document.getElementById('challengeChallenger').value;
    const defenderId = document.getElementById('challengeDefender').value;
    if (challengerId === defenderId) { toast('不能挑战自己！', 'error'); return; }
    STATE.challenges.push({
      id: gid(),
      challengerId,
      defenderId,
      status: 'pending',
      createdDate: new Date().toISOString(),
      score: null,
      winnerId: null,
    });
    saveData();
    toast('⚔️ 挑战已发出！', 'success');
    renderPage();
  });
}

function acceptChallenge(challengeId) {
  const c = STATE.challenges.find(ch => ch.id === challengeId);
  if (!c) return;

  const challenger = getPlayer(c.challengerId);
  const defender = getPlayer(c.defenderId);
  const html = `
    <div style="text-align:center;margin-bottom:16px">
      <div style="font-size:18px;font-weight:700">${challenger.avatar} ${challenger.name} <span style="color:var(--accent);margin:0 10px">VS</span> ${defender.avatar} ${defender.name}</div>
    </div>
    <div class="form-group">
      <label>比分 (例如: 2-1)</label>
      <input id="matchScore" placeholder="2-0 / 2-1 / 3-2 ..." value="2-0">
    </div>
    <div class="form-group">
      <label>胜者</label>
      <select id="matchWinner">
        <option value="${c.challengerId}">${challenger.name} (挑战者)</option>
        <option value="${c.defenderId}">${defender.name} (被挑战者)</option>
      </select>
    </div>
  `;
  showModal('接受挑战 · 录入结果', html, () => {
    const score = document.getElementById('matchScore').value;
    const winnerId = document.getElementById('matchWinner').value;

    c.status = 'completed';
    c.score = score;
    c.winnerId = winnerId;

    const match = {
      id: gid(),
      player1Id: c.challengerId,
      player2Id: c.defenderId,
      winnerId,
      score,
      date: new Date().toISOString(),
      type: 'ladder',
      tournamentId: null,
    };
    STATE.matches.push(match);
    updatePlayerStats(match);
    saveData();
    autoSettleBets('challenge', { challengeId: c.id }, match.winnerId, match.score);
    toast('✅ 挑战结果已记录！', 'success');
    renderPage();
  });
}

function declineChallenge(challengeId) {
  const c = STATE.challenges.find(ch => ch.id === challengeId);
  if (c) { c.status = 'declined'; saveData(); toast('挑战已拒绝', 'info'); renderPage(); }
  // Clean up related bets for this challenge
  STATE.bets = (STATE.bets || []).filter(b => !(b.gameType === 'challenge' && b.gameRef.challengeId === challengeId && b.status === 'open'));
}

    <button class="btn btn-primary btn-sm" onclick="showCreateTournamentModal()">📅 创建月赛</button>
  `;

  const tournaments = [...STATE.tournaments].sort((a,b) => new Date(b.date) - new Date(a.date));

  content.innerHTML = `
    ${tournaments.length === 0 ? `
    <div class="card">
      <div class="empty-state">
        <div class="empty-icon">🏆</div>

        <div class="card-header">
          <div>
            <div class="card-title">🏆 ${t.name}</div>
            <div style="font-size:12px;color:var(--text-secondary)">${fmtDate(t.date)}</div>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <span class="status ${t.status}">${t.status==='upcoming'?'即将开始':t.status==='active'?'进行中':'已结束'}</span>
            ${t.status === 'upcoming' ? `
              <button class="btn btn-primary btn-sm" onclick="startTournament('${t.id}')">▶ 开始比赛</button>
            ` : ''}
            ${t.status === 'active' ? `
              <button class="btn btn-outline btn-sm" onclick="showRecordMatchModal('${t.id}')">📝 录入赛果</button>
              <button class="btn btn-primary btn-sm" onclick="completeTournament('${t.id}')">🏁 结束月赛</button>
            ` : ''}
            <button class="btn btn-outline btn-sm" onclick="deleteTournament('${t.id}')">🗑</button>
          </div>
        </div>
        ${bracketHtml}
      </div>`;
    }).join('')}
  `;

function renderUpcomingTournament(t) {
  const participants = (t.participants || []).map(id => getPlayer(id)).filter(Boolean);
  return `
    <div style="padding:12px 0">
      <p style="margin-bottom:8px;color:var(--text-secondary)">已报名选手 (${participants.length}人)：</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${participants.length === 0 ? '<span style="color:var(--text-muted);font-size:13px">待报名...</span>' : ''}
        ${participants.map(p => `
          <span style="background:var(--bg-input);padding:6px 12px;border-radius:20px;font-size:13px">${p.avatar} ${p.name}</span>
        `).join('')}
      </div>
      ${participants.length < STATE.players.length ? `
        <div style="margin-top:12px">
          <button class="btn btn-outline btn-sm" onclick="showAddParticipantsModal('${t.id}')">+ 添加选手</button>
        </div>` : ''}
    </div>
  `;
}

function renderBracket(t) {
  if (!t.bracket || !t.bracket.rounds || t.bracket.rounds.length === 0) {
    return '<div class="empty-state"><p>尚未生成对阵表</p></div>';
  }

  const rounds = t.bracket.rounds;
  return `
    <div style="overflow-x:auto;padding:8px 0">
      <div class="bracket">
        ${rounds.map((round, ri) => `
          <div class="bracket-round" style="min-width:${ri===0?220:200}px">
            <div class="bracket-round-header">${round.label}</div>
            ${round.matches.map((m, mi) => `
              <div class="bracket-match">
                <div class="bracket-slot ${m.winnerId && m.winnerId===m.player1Id ? 'winner' : ''} ${!m.player1Id ? 'bye' : ''}"
                     onclick="showBracketMatchModal('${t.id}',${ri},${mi},1)"
                     style="cursor:pointer">
                  <span>${m.player1Id ? playerName(m.player1Id) : '轮空'}</span>
                  ${m.score && m.score !== 'W-L' ? `<span class="score">${m.score.split('-')[m.winnerId===m.player1Id?0:1]||''}</span>` : ''}
                  ${m.score === 'W-L' && m.winnerId===m.player1Id ? '<span class="score">W</span>' : ''}
                </div>
                <div class="bracket-slot ${m.winnerId && m.winnerId===m.player2Id ? 'winner' : ''} ${!m.player2Id ? 'bye' : ''}"
                     onclick="showBracketMatchModal('${t.id}',${ri},${mi},2)"
                     style="cursor:pointer">
                  <span>${m.player2Id ? playerName(m.player2Id) : '轮空'}</span>
                  ${m.score && m.score !== 'W-L' ? `<span class="score">${m.score.split('-')[m.winnerId===m.player2Id?0:1]||''}</span>` : ''}
                  ${m.score === 'W-L' && m.winnerId===m.player2Id ? '<span class="score">W</span>' : ''}
                </div>
              </div>
            `).join('')}
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function showBracketMatchModal(tournamentId, roundIdx, matchIdx, slot) {
  const t = STATE.tournaments.find(t => t.id === tournamentId);
  if (!t) return;
  const match = t.bracket.rounds[roundIdx].matches[matchIdx];
  const playerId = slot === 1 ? match.player1Id : match.player2Id;
  const opponentId = slot === 1 ? match.player2Id : match.player1Id;

  const allPlayers = STATE.players;
  const makeOpts = (selectedId) =>
    `<option value="">-- 选择选手 --</option>` +
    `<option value="__bye__" ${!selectedId?'selected':''}>🚫 轮空</option>` +
    allPlayers.map(p => `<option value="${p.id}" ${p.id===selectedId?'selected':''}>${p.name} (${p.character})</option>`).join('');

  const p1Label = `选手A${!match.player1Id ? ' (轮空)' : ''}`;
  const p2Label = `选手B${!match.player2Id ? ' (轮空)' : ''}`;

  const html = `
    <div class="form-group">
      <label>${p1Label}</label>
      <select id="bmPlayer1" onchange="onBracketPlayerChange()">${makeOpts(match.player1Id)}</select>
    </div>
    <div class="form-group">
      <label>${p2Label}</label>
      <select id="bmPlayer2" onchange="onBracketPlayerChange()">${makeOpts(match.player2Id)}</select>
    </div>
    <div class="form-group" id="bmScoreGroup">
      <label>比分</label>
      <input id="bmScore" placeholder="2-0 / 2-1" value="${match.score||''}">
    </div>
    <div class="form-group" id="bmWinnerGroup">
      <label>胜者</label>
      <select id="bmWinner">
        <option value="">-- 选择胜者 --</option>
        <option value="p1">选手A</option>
        <option value="p2">选手B</option>
      </select>
    </div>
  `;

  showModal('录入比赛结果', html, () => {
    let p1 = document.getElementById('bmPlayer1').value;
    let p2 = document.getElementById('bmPlayer2').value;
    const score = document.getElementById('bmScore').value;
    const winner = document.getElementById('bmWinner').value;

    // Handle "轮空" (bye)
    const p1IsBye = p1 === '__bye__';
    const p2IsBye = p2 === '__bye__';

    if (p1IsBye && p2IsBye) { toast('双方不能都轮空', 'error'); return; }

    if (p1IsBye || p2IsBye) {
      // Bye match: the non-bye player auto-wins
      if (p1IsBye) { p1 = null; match.winnerId = p2; }
      if (p2IsBye) { p2 = null; match.winnerId = p1; }
      match.player1Id = p1;
      match.player2Id = p2;
      match.score = 'W-L';
    } else {
      if (!p1 || !p2 || !score || !winner) { toast('请填写完整信息', 'error'); return; }
      if (p1 === p2) { toast('不能选择同一选手', 'error'); return; }
      match.player1Id = p1;
      match.player2Id = p2;
      match.score = score;
      match.winnerId = winner === 'p1' ? p1 : p2;
    }

    // Progress bracket: advance winner to next round
    if (roundIdx < t.bracket.rounds.length - 1) {
      const nextRound = t.bracket.rounds[roundIdx + 1];
      const nextMatchIdx = Math.floor(matchIdx / 2);
      if (nextRound.matches[nextMatchIdx]) {
        const slotInNext = matchIdx % 2 === 0 ? 'player1Id' : 'player2Id';
        nextRound.matches[nextMatchIdx][slotInNext] = match.winnerId;
      }
    }

    const newMatch = {
      id: gid(),
      player1Id: p1,
      player2Id: p2,
      winnerId: match.winnerId,
      score,
      date: new Date().toISOString(),
      type: 'tournament',
      tournamentId: t.id,
    };
    STATE.matches.push(newMatch);
    updatePlayerStats(newMatch);
    saveData();
    autoSettleBets('tournament', { tournamentId: t.id, roundIdx, matchIdx }, newMatch.winnerId, newMatch.score);
    toast('✅ 赛果已录入！', 'success');
    renderPage();
  });
}

  if (!t) return;

  saveData();
  toast('▶ 月赛开始！', 'success');
  renderPage();
}

function generateBracket(participantIds) {
  // Single elimination bracket
  const shuffled = [...participantIds].sort(() => Math.random() - 0.5);
  // Pad to power of 2
  let n = 1;
  while (n < shuffled.length) n *= 2;
  const padded = [...shuffled];
  while (padded.length < n) padded.push(null);

  const rounds = [];
  const roundNames = {2:'决赛',4:'半决赛',8:'四分之一决赛',16:'八分之一决赛',32:'16强赛'};
  let currentRound = padded;
  let roundNum = 1;

  while (currentRound.length >= 2) {
    const matches = [];
    for (let i = 0; i < currentRound.length; i += 2) {
      matches.push({
        player1Id: currentRound[i],
        player2Id: currentRound[i+1],
        winnerId: null,
        score: null,
      });
    }
    rounds.push({
      label: roundNames[currentRound.length] || `第${roundNum}轮`,
      matches,
    });
    currentRound = new Array(currentRound.length / 2).fill(null);
    roundNum++;
  }

  return { rounds: rounds.reverse() };
}

function completeTournament(tournamentId) {
  const t = STATE.tournaments.find(t => t.id === tournamentId);
  if (!t) return;

  // Award points based on bracket results
  const finalRound = t.bracket.rounds[0];
  if (finalRound && finalRound.matches[0] && finalRound.matches[0].winnerId) {
    const winner = getPlayer(finalRound.matches[0].winnerId);
    if (winner) winner.points += 100;

    const runnerUpId = finalRound.matches[0].winnerId === finalRound.matches[0].player1Id
      ? finalRound.matches[0].player2Id : finalRound.matches[0].player1Id;
    const runnerUp = getPlayer(runnerUpId);
    if (runnerUp) runnerUp.points += 70;

    // Semi-finalists
    if (t.bracket.rounds[1]) {
      t.bracket.rounds[1].matches.forEach(m => {
        [m.player1Id, m.player2Id].forEach(pid => {
          if (pid && pid !== finalRound.matches[0].winnerId && pid !== runnerUpId) {
            const p = getPlayer(pid);
            if (p) p.points += 30;
          }
        });
      });
    }

    // Participation points
    (t.participants || []).forEach(pid => {
      const p = getPlayer(pid);
      if (p) p.points += 10;
    });
  }

  t.status = 'completed';
  saveData();
  toast('🏁 月赛已结束！积分已发放', 'success');
  renderPage();
}

function getBettor(id) { return (STATE.bettors || []).find(b => b.id === id); }
function bettorName(id) { const b = getBettor(id); return b ? b.name : '未知'; }

function autoSettleBets(gameType, gameRef, actualWinnerId, actualScore) {
  const bets = STATE.bets || [];
  bets.forEach(bet => {
    if (bet.status !== 'open') return;
    if (bet.gameType !== gameType) return;

    let matchFound = false;
    if (gameType === 'challenge') {
      matchFound = bet.gameRef.challengeId === gameRef.challengeId;
    } else if (gameType === 'tournament') {
      matchFound = bet.gameRef.tournamentId === gameRef.tournamentId &&
                   bet.gameRef.roundIdx === gameRef.roundIdx &&
                   bet.gameRef.matchIdx === gameRef.matchIdx;
    } else if (gameType === 'playoffs') {
      matchFound = bet.gameRef.roundIdx === gameRef.roundIdx &&
                   bet.gameRef.matchIdx === gameRef.matchIdx;
    }
    if (!matchFound) return;

    bet.actualWinnerId = actualWinnerId;
    bet.actualScore = actualScore;
    bet.status = 'settled';
    bet.settledDate = new Date().toISOString();

    Object.entries(bet.predictions || {}).forEach(([bettorId, pred]) => {
      const bettor = getBettor(bettorId);
      if (!bettor) return;
      if (bet.betType === 'winner') {
        if (pred.predictedWinnerId === actualWinnerId) {
          bettor.coins = (bettor.coins || 0) + 1;
          pred.result = 'win';
        } else {
          bettor.coins = (bettor.coins || 0) - 1;
          pred.result = 'lose';
        }
      } else if (bet.betType === 'score') {
        if (pred.predictedWinnerId !== actualWinnerId) {
          bettor.coins = (bettor.coins || 0) - 1;
          pred.result = 'lose';
        } else if (pred.predictedScore === actualScore) {
          bettor.coins = (bettor.coins || 0) + 2;
          pred.result = 'win';
        } else {
          pred.result = 'draw';
        }
      }
    });
  });
}

            gameType: 'playoffs',

function generateSeededBracket(rankedIds) {
  // Seeded bracket: 1v8, 4v5, 2v7, 3v6  (standard seeding)
  const n = rankedIds.length;
  // Pad to power of 2
  let size = 1;
  while (size < n) size *= 2;
  const padded = [...rankedIds];
  while (padded.length < size) padded.push(null);

  // Standard seeding order for power-of-2 brackets
  function seedOrder(num) {
    const arr = [];
    for (let i = 0; i < num; i++) arr.push(i);
    function reorder(a) {
      if (a.length <= 2) return a;
      const mid = a.length / 2;
      const top = a.slice(0, mid);
      const bottom = a.slice(mid);
      return [...reorder(top), ...reorder(bottom)];
    }
    return reorder(arr);
  }

  const order = seedOrder(size);
  const seeded = order.map(i => i < n ? padded[i] : null);

  const rounds = [];
  const roundNames = {2:'决赛',4:'半决赛',8:'四分之一决赛',16:'八分之一决赛',32:'16强赛'};
  let currentRound = seeded;
  let roundNum = 1;

  while (currentRound.length >= 2) {
    const matches = [];
    for (let i = 0; i < currentRound.length; i += 2) {
      matches.push({
        player1Id: currentRound[i] || null,
        player2Id: currentRound[i+1] || null,
        winnerId: null,
        score: null,
      });
    }
    rounds.push({
      label: roundNames[currentRound.length] || `第${roundNum}轮`,
      matches,
    });
    currentRound = new Array(currentRound.length / 2).fill(null);
    roundNum++;
  }

  return { rounds: rounds.reverse() };
}

function startPlayoffs() {
  const s = getSeason();
  if (!s) return;

  const ranked = getRankedPlayers();
  const count = Math.min(PLAYOFF_QUALIFY_COUNT, ranked.length);
  if (count < 2) { toast('至少需要2名选手才能开启季后赛', 'error'); return; }

  const qualifiers = ranked.slice(0, count).map(p => p.id);

  s.playoffs = {
    status: 'active',
    qualifierCount: count,
    qualifiers,
    bracket: generateSeededBracket(qualifiers),

}

function completePlayoffs() {
  const s = getSeason();
  if (!s || !s.playoffs || s.playoffs.status !== 'active') return;
  const p = s.playoffs;
  const finalRound = p.bracket.rounds[0];
  if (!finalRound || !finalRound.matches[0] || !finalRound.matches[0].winnerId) {
    toast('请先完成所有比赛', 'error'); return;
  }

  if (!confirm('确定结束本赛季季后赛吗？冠军积分将立即发放。')) return;

  const championId = finalRound.matches[0].winnerId;
  const champion = getPlayer(championId);
  if (champion) champion.points += 200;

  // Runner-up +120
  const runnerUpId = championId === finalRound.matches[0].player1Id
    ? finalRound.matches[0].player2Id : finalRound.matches[0].player1Id;
  const runnerUp = getPlayer(runnerUpId);
  if (runnerUp) runnerUp.points += 120;

  // Semi-finalists +60
  const bracket = p.bracket;
  if (bracket.rounds[1]) {
    bracket.rounds[1].matches.forEach(m => {
      [m.player1Id, m.player2Id].forEach(pid => {
        if (pid && pid !== championId && pid !== runnerUpId) {
          const pp = getPlayer(pid);
          if (pp) pp.points += 60;
        }
      });
    });
  }

  p.status = 'completed';
  p.championId = championId;
  s.status = 'completed';
  saveData();
  toast(`🏆 ${playerName(championId)} 加冕赛季总冠军！`, 'success');
  renderPage();
}

                  <span>${m.player2Id ? playerName(m.player2Id) : '轮空 (点击选择)'}</span>
                  ${m.score ? `<span class="score">${m.score === 'W' ? 'W' : m.score.split('-')[m.winnerId === m.player2Id ? 1 : 0]||''}</span>` : ''}
                </div>
              </div>
            `).join('')}
          </div>
        `).join('')}
      </div>

      <div style="display:flex;justify-content:flex-end;margin-top:20px">
        <button class="btn btn-primary" onclick="completePlayoffs()">🏁 结束季后赛 · 发放积分</button>
      </div>
    `;
    return;
  }

  if (playoffs.status === 'completed') {
    const champion = getPlayer(playoffs.championId);
    content.innerHTML = `
      <div class="card" style="text-align:center;padding:40px;border:3px solid var(--accent)">
        <div style="font-size:64px;margin-bottom:10px">🏆</div>
        <h2 style="font-size:28px;color:var(--accent)">${champion ? champion.name : '—'} 是 ${s.name} 总冠军！</h2>
        <p style="font-size:16px;color:var(--text-secondary);margin:10px 0">
          ${champion ? champion.character : ''} · 季后赛冠军 +200 积分
        </p>
        <button class="btn btn-outline btn-sm" onclick="navigate('history')" style="margin-top:10px">查看季后赛战绩</button>
      </div>
    `;
    return;
  }
}

function showAddParticipantsModal(tournamentId) {
  const t = STATE.tournaments.find(t => t.id === tournamentId);
  if (!t) return;
  const notIncluded = STATE.players.filter(p => !(t.participants||[]).includes(p.id));
  const html = `
    <p style="margin-bottom:12px;color:var(--text-secondary)">选择要添加的选手：</p>
    ${notIncluded.map(p => `
      <label style="display:flex;align-items:center;gap:8px;padding:8px 0;cursor:pointer">
        <input type="checkbox" value="${p.id}" class="addPlayerCheck">
        <span>${p.avatar} ${p.name} (${p.character})</span>
      </label>
    `).join('')}
    ${notIncluded.length === 0 ? '<p style="color:var(--text-muted)">所有选手已报名</p>' : ''}
  `;
  showModal('添加参赛选手', html, () => {
    const checks = document.querySelectorAll('.addPlayerCheck:checked');

    saveData();
    toast(`已添加 ${checks.length} 名选手`, 'success');
    renderPage();
  });
}

function deletePlayer(playerId) {
  const p = getPlayer(playerId);
  if (!confirm(`确定删除选手「${p.name}」吗？相关战绩将保留。`)) return;
  STATE.players = STATE.players.filter(p => p.id !== playerId);
  STATE.challenges = STATE.challenges.filter(c => c.challengerId !== playerId && c.defenderId !== playerId);
  STATE.tournaments.forEach(t => {
    if (t.participants) t.participants = t.participants.filter(id => id !== playerId);
    if (t.bracket) {
      t.bracket.rounds.forEach(r => r.matches.forEach(m => {
        if (m.player1Id === playerId) m.player1Id = null;
        if (m.player2Id === playerId) m.player2Id = null;
        if (m.winnerId === playerId) m.winnerId = null;
      }));
    }
  });
  saveData();
  toast('选手已删除', 'info');
  renderPage();
}

let bettingTab = 'open';
let currentBettorId = localStorage.getItem('sfBetBettorId') || null;

function renderBetting(header, content) {
  const bettors = STATE.bettors || [];
  const bets = STATE.bets || [];
  const openBets = bets.filter(b => b.status === 'open');
  const settledBets = [...bets].filter(b => b.status === 'settled').sort((a,b) => new Date(b.settledDate||0) - new Date(a.settledDate||0));

  // Ensure currentBettorId is valid (the bettor might have been deleted)
  if (currentBettorId && !bettors.find(b => b.id === currentBettorId)) currentBettorId = null;
  if (!currentBettorId && bettors.length) currentBettorId = bettors[0].id;

  const me = bettors.find(b => b.id === currentBettorId);
  const idSel = bettors.length > 0 ? `
    <div style="display:flex;align-items:center;gap:6px;margin-top:4px">
      <span style="font-size:11px;color:var(--text-muted)">当前身份:</span>
      <select onchange="switchBettor(this.value)" style="font-size:12px;padding:2px 6px;border:1px solid var(--border);border-radius:4px;background:var(--bg-card);color:var(--text-primary)">
        ${bettors.map(b => '<option value="'+b.id+'"'+(b.id===currentBettorId?' selected':'')+'>'+b.name+' (🪙'+(b.coins||0)+')</option>').join('')}
      </select>
    </div>
  ` : '';

  header.innerHTML = `
    <div>
      <div class="page-title">🎲 竞猜中心</div>
      <div class="page-subtitle">${bettors.length}名竞猜者 · ${openBets.length}场开放竞猜 · ${settledBets.length}场已结算</div>
      ${idSel}
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary btn-sm" onclick="showRegisterBettorModal()">${bettors.length ? '+ 注册竞猜者' : '🎯 注册成为竞猜者'}</button>
      <button class="btn btn-outline btn-sm" onclick="showCreateBetModal()">🎲 发起竞猜</button>
    </div>
  `;

  content.innerHTML = `
    <div class="betting-tabs">
      <button class="betting-tab ${bettingTab==='bettors'?'active':''}" onclick="setBettingTab('bettors')">👥 竞猜者</button>
      <button class="betting-tab ${bettingTab==='open'?'active':''}" onclick="setBettingTab('open')">🎲 开放竞猜 ${openBets.length?'('+openBets.length+')':''}</button>
      <button class="betting-tab ${bettingTab==='settled'?'active':''}" onclick="setBettingTab('settled')">📋 已结算 ${settledBets.length?'('+settledBets.length+')':''}</button>
    </div>
    <div id="bettingTabContent">${renderBettingTab()}</div>
  `;
}

function switchBettor(id) {
  currentBettorId = id;
  localStorage.setItem('sfBetBettorId', id);
  renderPage();
}

function setBettingTab(tab) {
  bettingTab = tab;
  const tc = document.getElementById('bettingTabContent');
  if (tc) tc.innerHTML = renderBettingTab();
  document.querySelectorAll('.betting-tab').forEach(t => {
    t.classList.toggle('active', t.textContent.trim().startsWith(tab==='bettors'?'\uD83D\uDC65':tab==='open'?'\uD83C\uDFB2':'\uD83D\uDCCB'));
  });
}

function renderBettingTab() {
  if (bettingTab === 'bettors') return renderBettorsTab();
  if (bettingTab === 'open') return renderOpenBetsTab();
  return renderSettledBetsTab();
}

function renderBettorsTab() {
  const bettors = [...(STATE.bettors || [])].sort((a,b) => (b.coins||0) - (a.coins||0));
  if (!bettors.length) {
    return '<div class="card"><div class="empty-state"><div class="empty-icon">🎲</div><p>还没有竞猜者注册</p><button class="btn btn-primary btn-sm" style="margin-top:12px" onclick="showRegisterBettorModal()">成为第一个竞猜者</button></div></div>';
  }
  return '<div class="card"><table><thead><tr><th>排名</th><th>竞猜者</th><th>竞猜币</th><th>胜/负/平</th><th>注册日期</th><th></th></tr></thead><tbody>'
    + bettors.map((b, i) => {
      let wins = 0, losses = 0, draws = 0;
      (STATE.bets || []).forEach(bet => {
        if (bet.status==='settled' && bet.predictions && bet.predictions[b.id]) {
          const r = bet.predictions[b.id].result;
          if (r==='win') wins++; else if (r==='lose') losses++; else if (r==='draw') draws++;
        }
      });
      const c = b.coins || 0;
      return '<tr><td><span class="rank-badge rank-'+(i<3?i+1:'other')+'">'+(i+1)+'</span></td>'
        + '<td><span style="font-weight:600">'+b.name+'</span></td>'
        + '<td><span class="'+(c>0?'coins-positive':c<0?'coins-negative':'')+'" style="font-weight:700;font-size:16px">'+(c>0?'+'+c:c)+'</span> 🪙</td>'
        + '<td><span style="color:var(--success)">'+wins+'W</span> / <span style="color:var(--danger)">'+losses+'L</span> / <span style="color:var(--accent2)">'+draws+'D</span></td>'
        + '<td>'+fmtDate(b.joinDate)+'</td>'
        + '<td><button class="btn btn-outline btn-sm" onclick="unregisterBettor(\''+b.id+'\')" style="color:var(--danger);font-size:11px">注销</button></td></tr>';
    }).join('')+'</tbody></table></div>';
}

function renderOpenBetsTab() {
  const bets = (STATE.bets || []).filter(b => b.status === 'open');
  if (!bets.length) {
    return '<div class="card"><div class="empty-state"><div class="empty-icon">🎲</div><p>暂无开放竞猜</p><button class="btn btn-primary btn-sm" style="margin-top:12px" onclick="showCreateBetModal()">发起一场竞猜</button></div></div>';
  }
  return bets.map(bet => renderBetCard(bet)).join('');
}

function renderSettledBetsTab() {
  const bets = [...(STATE.bets || [])].filter(b => b.status === 'settled').sort((a,b) => new Date(b.settledDate||0) - new Date(a.settledDate||0));
  if (!bets.length) {
    return '<div class="card"><div class="empty-state"><div class="empty-icon">📋</div><p>暂无已结算竞猜</p></div></div>';
  }
  return bets.map(bet => renderBetCard(bet)).join('');
}

function renderBetCard(bet) {
  const tl = { challenge:'⚔️ 擂台', tournament:'🏆 月赛', playoffs:'👑 季后赛' };
  const btl = bet.betType === 'winner' ? '猜胜者' : '猜比分';
  const preds = Object.entries(bet.predictions || {});

  let h = '<div class="card bet-card" style="border-left:3px solid '+(bet.status==='open'?'var(--accent3)':'var(--text-muted)')+'">';
  h += '<div class="bet-header"><div>';
  h += '<div class="bet-title">'+(tl[bet.gameType]||bet.gameType)+' · '+btl+'</div>';
  h += '<div class="bet-meta">'+fmtDateTime(bet.createdDate)+' · '+(bet.status==='open'?'进行中':'已结算')+'</div></div>';
  h += '<div style="display:flex;gap:6px;align-items:center">';
  h += (bet.status==='open'
    ? '<span class="status" style="background:var(--accent3);color:#fff">开放</span>'
    : '<span class="status" style="background:var(--text-muted);color:#fff">已结算</span>');
  if (bet.status==='open') h += '<button class="btn btn-outline btn-sm" onclick="deleteBet(\''+bet.id+'\')">🗑</button>';
  h += '</div></div>';

  h += '<div class="bet-vs"><span>'+bet.player1Name+'</span><span class="vs-word">VS</span><span>'+bet.player2Name+'</span></div>';

  if (bet.status==='settled') {
    h += '<div style="font-size:14px;margin-bottom:8px;color:var(--accent)">🏆 实际结果：<strong>'+playerName(bet.actualWinnerId)+'</strong> 胜'
      + (bet.betType==='score' && bet.actualScore ? ' (比分 '+bet.actualScore+')' : '') + '</div>';
  }

  if (preds.length > 0) {
    h += '<div style="margin:8px 0"><div style="font-size:12px;color:var(--text-muted);margin-bottom:4px">'+preds.length+'人参与竞猜：</div>';
    preds.forEach(([bid, pred]) => {
      const bb = getBettor(bid);
      const name = bb ? bb.name : bettorName(bid);
      const rc = bet.status==='settled' ? (pred.result||'') : '';
      const myId = currentBettorId;
      const mb = pred.matchedBy || [];
      h += '<div class="bet-prediction '+rc+'">';
      h += '<span style="font-weight:600;min-width:80px">'+name+'</span> ';
      h += '<span style="color:var(--text-secondary)">预测</span> ';
      h += '<span style="font-weight:600;color:var(--accent)">'+playerName(pred.predictedWinnerId)+'</span> ';
      h += '<span style="color:var(--text-secondary)">胜</span>';
      if (bet.betType==='score' && pred.predictedScore) h += '<span style="color:var(--text-muted);font-size:12px">('+pred.predictedScore+')</span>';
      if (rc) h += '<span class="bet-result-badge '+rc+'">'+(rc==='win'?'✅':rc==='lose'?'❌':'➖')+'</span>';
      if (pred.sideBet) {
        h += '<span class="side-bet-text">「'+pred.sideBet+'」</span>';
        if (mb.length > 0) h += '<span style="color:var(--accent3);font-size:10px"> 已跟注: '+mb.map(id => bettorName(id)).join('、')+'</span>';
      }
      // Follow/unfollow buttons for other people's sideBets (open bets only)
      // Rules: must have own prediction, own sideBet empty, different winner prediction
      if (bet.status==='open' && bid!==myId && myId && pred.sideBet) {
        const myPred = (bet.predictions||{})[myId];
        const canFollow = myPred && !myPred.sideBet && myPred.predictedWinnerId !== pred.predictedWinnerId;
        if (mb.includes(myId)) {
          h += '<button class="btn btn-outline btn-sm" onclick="unfollowSideBet(\''+bet.id+'\',\''+bid+'\')" style="margin-left:auto;font-size:10px" title="取消跟注">🔕 取消</button>';
        } else if (canFollow) {
          h += '<button class="btn btn-primary btn-sm" onclick="followSideBet(\''+bet.id+'\',\''+bid+'\')" style="margin-left:auto;font-size:10px">🤝 跟上</button>';
        } else if (myPred && myPred.predictedWinnerId === pred.predictedWinnerId) {
          // same side, no point in betting against each other — show hint
          h += '<span style="margin-left:auto;font-size:10px;color:var(--text-muted)" title="双方预测相同，无法跟注">🎲 同边</span>';
        }
      }
      if (bet.status==='open' && bid===myId) h += '<button class="btn btn-outline btn-sm" onclick="modifyPrediction(\''+bet.id+'\')" style="margin-left:auto;font-size:10px">修改</button>';
      h += '</div>';
    });
    h += '</div>';
  } else {
    h += '<div style="font-size:12px;color:var(--text-muted);margin:8px 0">暂无竞猜者参与</div>';
  }

  if (bet.status==='open') {
    h += '<div class="bet-actions"><button class="btn btn-primary btn-sm" onclick="showJoinBetModal(\''+bet.id+'\')">🎯 参与竞猜</button></div>';
  }
  h += '</div>';
  return h;
}

function showRegisterBettorModal() {
  const html = '<p style="margin-bottom:12px;color:var(--text-secondary)">注册后即可参与比赛竞猜，初始获得 <strong style="color:var(--accent)">10</strong> 竞猜币</p>'
    + '<div class="form-group"><label>你的昵称</label><input id="bettorName" placeholder="输入昵称"></div>';
  showModal('注册竞猜者', html, () => {
    const name = document.getElementById('bettorName').value.trim();
    if (!name) { toast('请输入昵称', 'error'); return; }
    STATE.bettors = STATE.bettors || [];
    if (STATE.bettors.find(b => b.name === name)) { toast('该昵称已被注册', 'error'); return; }
    STATE.bettors.push({ id: gid(), name, joinDate: new Date().toISOString(), coins: 10 });
    const newId = STATE.bettors[STATE.bettors.length-1].id;
    currentBettorId = newId;
    localStorage.setItem('sfBetBettorId', newId);
    saveData(); toast('🎲 注册成功！获得 10 竞猜币', 'success'); renderPage();
  });
}

function unregisterBettor(id) {
  const b = getBettor(id);
  if (!b || !confirm('确定注销竞猜者「'+b.name+'」吗？竞猜记录将保留。')) return;
  STATE.bettors = (STATE.bettors || []).filter(bb => bb.id !== id);
  saveData(); toast('已注销', 'info'); renderPage();
}

function showCreateBetModal() {
  const games = getBettableGames();
  if (!games.length) { toast('当前没有可竞猜的比赛（需要先有未完成的擂台挑战/月赛对阵/季后赛对阵）', 'info'); return; }
  const html = '<div class="form-group"><label>选择比赛</label><select id="betGame">'
    + games.map(g => '<option value="'+g.id+'">'+g.label+'</option>').join('')
    + '</select></div><div class="form-group"><label>竞猜类型</label>'
    + '<select id="betType"><option value="winner">猜胜者</option><option value="score">猜比分</option></select></div>';
  showModal('发起竞猜', html, () => {
    const gidVal = document.getElementById('betGame').value;
    const bt = document.getElementById('betType').value;
    const game = games.find(g => g.id === gidVal);
    if (!game) return;
    STATE.bets = STATE.bets || [];
    const ex = STATE.bets.find(b => {
      if (b.status !== 'open' || b.gameType !== game.gameType) return false;
      if (game.gameType === 'challenge') return b.gameRef.challengeId === game.gameRef.challengeId;
      if (game.gameType === 'tournament') return b.gameRef.tournamentId === game.gameRef.tournamentId
        && b.gameRef.roundIdx === game.gameRef.roundIdx && b.gameRef.matchIdx === game.gameRef.matchIdx;
      if (game.gameType === 'playoffs') return b.gameRef.roundIdx === game.gameRef.roundIdx
        && b.gameRef.matchIdx === game.gameRef.matchIdx;
      return false;
    });
    if (ex) { toast('该比赛已有开放竞猜', 'error'); return; }
    createBet(game.gameType, game.gameRef, game.player1Id, game.player2Id, bt);
    saveData(); toast('🎲 竞猜已发起！', 'success'); renderPage();
  });
}

function createBet(gameType, gameRef, player1Id, player2Id, betType) {
  const p1 = getPlayer(player1Id);
  const p2 = getPlayer(player2Id);
  STATE.bets = STATE.bets || [];
  STATE.bets.push({
    id: gid(),
    gameType,
    gameRef,
    player1Id,
    player2Id,
    player1Name: p1 ? p1.name : '?',
    player2Name: p2 ? p2.name : '?',
    betType,
    createdBy: 'system',
    createdDate: new Date().toISOString(),
    status: 'open',
    predictions: {},
  });
}

function showJoinBetModal(betId) {
  const bet = (STATE.bets || []).find(b => b.id === betId);
  if (!bet) return;
  const bettors = STATE.bettors || [];
  if (!bettors.length) { toast('请先注册成为竞猜者', 'info'); return; }
  const html = '<div class="form-group"><label>选择竞猜者</label><select id="joinBettor">'
    + bettors.map(b => '<option value="'+b.id+'">'+b.name+' (🪙'+(b.coins||0)+')</option>').join('')
    + '</select></div><div class="form-group"><label>预测胜者</label><select id="joinWinner">'
    + '<option value="'+bet.player1Id+'">'+bet.player1Name+'</option><option value="'+bet.player2Id+'">'+bet.player2Name+'</option>'
    + '</select></div>'
    + (bet.betType === 'score' ? '<div class="form-group"><label>预测比分 (例如: 2-1)</label><input id="joinScore" placeholder="2-0 / 2-1 / 3-2 ..." value="2-0"></div>' : '')
    + '<div class="form-group"><label>口头赌注 (可选)</label><input id="joinSideBet" placeholder="例如: 一顿午餐、一杯奶茶..."></div>'
    + '<p style="font-size:11px;color:var(--text-muted);margin-top:4px">竞猜币规则：猜对 +1🪙 | 猜错 -1🪙 | 猜比分模式猜对 +2🪙，猜错 -1🪙</p>';
  showModal('参与竞猜', html, () => {
    const bettorId = document.getElementById('joinBettor').value;
    bet.predictions = bet.predictions || {};
    // Preserve existing matchedBy if this bettor is re-joining
    const oldPred = bet.predictions[bettorId];
    bet.predictions[bettorId] = {
      predictedWinnerId: document.getElementById('joinWinner').value,
      predictedScore: bet.betType === 'score' ? (document.getElementById('joinScore')?.value || '') : '',
      sideBet: document.getElementById('joinSideBet')?.value.trim() || '',
      matchedBy: oldPred ? (oldPred.matchedBy || []) : [],
    };
    saveData(); toast('✅ 竞猜已提交！', 'success'); renderPage();
  });
}

function followSideBet(betId, targetBettorId) {
  const bet = (STATE.bets || []).find(b => b.id === betId);
  if (!bet || bet.status !== 'open') { toast('竞猜已结算', 'info'); return; }
  if (!currentBettorId) { toast('请先在竞猜页面选择你的身份', 'info'); return; }
  const myId = currentBettorId;
  if (myId === targetBettorId) { toast('不能跟自己跟注', 'error'); return; }
  const targetPred = (bet.predictions || {})[targetBettorId];
  if (!targetPred || !targetPred.sideBet) { toast('该竞猜者没有口头赌注', 'info'); return; }
  const myPred = (bet.predictions || {})[myId];
  if (!myPred) { toast('请先参与竞猜再跟注', 'info'); return; }
  if (myPred.sideBet) { toast('你已经有口头赌注了，无法跟注他人', 'info'); return; }
  if (myPred.predictedWinnerId === targetPred.predictedWinnerId) { toast('双方预测相同，无法跟注', 'info'); return; }
  targetPred.matchedBy = targetPred.matchedBy || [];
  if (targetPred.matchedBy.includes(myId)) { toast('你已经跟过这个赌注了', 'info'); return; }
  targetPred.matchedBy.push(myId);
  saveData(); toast('✅ 已跟上「'+targetPred.sideBet+'」', 'success'); renderPage();
}

function unfollowSideBet(betId, targetBettorId) {
  const bet = (STATE.bets || []).find(b => b.id === betId);
  if (!bet || bet.status !== 'open') { toast('竞猜已结算', 'info'); return; }
  if (!currentBettorId) return;
  const myId = currentBettorId;
  const targetPred = (bet.predictions || {})[targetBettorId];
  if (!targetPred || !targetPred.matchedBy) return;
  targetPred.matchedBy = targetPred.matchedBy.filter(id => id !== myId);
  saveData(); toast('已取消跟注', 'info'); renderPage();
}

function modifyPrediction(betId) {
  const bet = (STATE.bets || []).find(b => b.id === betId);
  if (!bet || bet.status !== 'open') { toast('竞猜已结算，无法修改', 'info'); return; }
  if (!currentBettorId) return;
  const myId = currentBettorId;
  const pred = (bet.predictions || {})[myId];
  if (!pred) { toast('你尚未参与此竞猜', 'info'); return; }
  const html = '<div class="form-group"><label>预测胜者</label><select id="joinWinner">'
    + '<option value="'+bet.player1Id+'"'+(pred.predictedWinnerId===bet.player1Id?' selected':'')+'>'+bet.player1Name+'</option>'
    + '<option value="'+bet.player2Id+'"'+(pred.predictedWinnerId===bet.player2Id?' selected':'')+'>'+bet.player2Name+'</option>'
    + '</select></div>'
    + (bet.betType==='score' ? '<div class="form-group"><label>预测比分</label><input id="joinScore" value="'+(pred.predictedScore||'2-0')+'"></div>' : '')
    + '<div class="form-group"><label>口头赌注</label><input id="joinSideBet" value="'+(pred.sideBet||'')+'"></div>';
  showModal('修改预测', html, () => {
    bet.predictions = bet.predictions || {};
    bet.predictions[myId] = {
      predictedWinnerId: document.getElementById('joinWinner').value,
      predictedScore: bet.betType==='score' ? (document.getElementById('joinScore')?.value || '') : '',
      sideBet: document.getElementById('joinSideBet')?.value.trim() || '',
      matchedBy: pred.matchedBy || [],
    };
    saveData(); toast('✅ 预测已更新', 'success'); renderPage();
  });
}

function deleteBet(betId) {
  if (!confirm('确定删除此竞猜吗？')) return;
  STATE.bets = (STATE.bets || []).filter(b => b.id !== betId);
  saveData(); toast('竞猜已删除', 'info'); renderPage();
}

      if (playerFilter !== 'all' && m.player1Id !== playerFilter && m.player2Id !== playerFilter) return false;

      <div class="card" style="padding:14px 20px">
        <div style="display:flex;align-items:center;gap:16px;font-size:14px">
          <span style="color:var(--text-muted);font-size:12px">${fmtDateTime(m.date)}</span>

function showRecordDirectMatchModal() {
  const playerOptions = STATE.players.map(p => `<option value="${p.id}">${p.name} (${p.character})</option>`).join('');
  const html = `
    <div class="form-group">
      <label>选手A</label>
      <select id="dmPlayer1">${playerOptions}</select>
    </div>
    <div class="form-group">
      <label>选手B</label>
      <select id="dmPlayer2">${playerOptions}</select>
    </div>
    <div class="form-group">
      <label>比分</label>
      <input id="dmScore" placeholder="2-0 / 2-1 / 3-2 ..." value="2-0">
    </div>
    <div class="form-group">
      <label>胜者</label>
      <select id="dmWinner">
        <option value="p1">选手A</option>
        <option value="p2">选手B</option>
      </select>
    </div>
    <div class="form-group">
      <label>类型</label>
      <select id="dmType">
        <option value="ladder">擂台赛</option>
        <option value="tournament">月赛</option>
      </select>
    </div>
  `;
  showModal('录入对局', html, () => {
    const p1 = document.getElementById('dmPlayer1').value;
    const p2 = document.getElementById('dmPlayer2').value;
    const score = document.getElementById('dmScore').value;
    const winner = document.getElementById('dmWinner').value;
    const type = document.getElementById('dmType').value;

    if (p1 === p2) { toast('不能和自己对战', 'error'); return; }
    if (!score) { toast('请输入比分', 'error'); return; }

    const match = {
      id: gid(),
      player1Id: p1,
      player2Id: p2,
      winnerId: winner === 'p1' ? p1 : p2,
      score,
      date: new Date().toISOString(),
      type,
      tournamentId: null,
    };
    STATE.matches.push(match);
    updatePlayerStats(match);
    saveData();
    toast('✅ 对局已录入', 'success');
    renderPage();
  });
}

function deleteMatch(matchId) {
  if (!confirm('确定删除此对局记录吗？选手数据也会回退。')) return;
  STATE.matches = STATE.matches.filter(m => m.id !== matchId);
  // Recalculate all player stats
  STATE.players.forEach(p => { p.wins = 0; p.losses = 0; });
  STATE.matches.forEach(m => updatePlayerStats(m));
  saveData();
  toast('已删除', 'info');
  renderPage();
}

function exportHistory() {
  const rows = [['日期','类型','选手A','选手B','比分','胜者']];
  STATE.matches.sort((a,b) => new Date(b.date)-new Date(a.date)).forEach(m => {
    rows.push([fmtDate(m.date), m.type, playerName(m.player1Id), playerName(m.player2Id), m.score, playerName(m.winnerId)]);
  });
  const csv = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `街霸战绩_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast('📥 CSV已下载', 'success');
}

// ============================================================
// UTILS
// ============================================================
function updatePlayerStats(match) {
  const p1 = getPlayer(match.player1Id);
  const p2 = getPlayer(match.player2Id);
  if (!p1 || !p2) return;
  if (match.winnerId === match.player1Id) {
    p1.wins++; p2.losses++;
    if (match.type === 'ladder') p1.points += 5;
  } else if (match.winnerId === match.player2Id) {
    p2.wins++; p1.losses++;
    if (match.type === 'ladder') p2.points += 5;
  }
}

// ============================================================
// INIT
// ============================================================
async function init() {
  // Load state from server first
  await apiLoad();
  if (!STATE.seasons || STATE.seasons.length === 0) {
    STATE.seasons = [{ id:'s1', name:'2026夏季赛', startDate:'2026-06-01', endDate:'2026-08-31', status:'active' }];
    STATE.currentSeasonId = 's1';
  }

  // Recalculate stats from matches
  STATE.players.forEach(p => { p.wins = 0; p.losses = 0; p.points = 0; });
  STATE.matches.forEach(m => updatePlayerStats(m));

  // Ensure betting data exists (migration from older versions)
  if (!STATE.bettors) STATE.bettors = [];
  if (!STATE.bets) STATE.bets = [];
  // Migrate predictions: add matchedBy array to old predictions
  (STATE.bets || []).forEach(bet => {
    Object.values(bet.predictions || {}).forEach(p => {
      if (!p.matchedBy) p.matchedBy = [];
    });
  });

  saveData();
  renderSidebar();
  renderPage();
}

init();
