name: Keep Render Service Alive

on:
  schedule:
    # 每 14 分钟跑一次（Render 免费版 15 分钟休眠）
    - cron: '*/14 * * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping service to prevent sleep
        run: |
          echo "Pinging https://kihanfighter.onrender.com/ ..."
          HTTP_CODE=$(curl -sL -o /dev/null -w "%{http_code}" "https://kihanfighter.onrender.com/ping")
          echo "Response: HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Service is alive"
          else
            echo "⚠️ Service returned $HTTP_CODE, retrying in 30s..."
            sleep 30
            HTTP_CODE=$(curl -sL -o /dev/null -w "%{http_code}" "https://kihanfighter.onrender.com/ping")
            echo "Retry response: HTTP $HTTP_CODE"
          fi
